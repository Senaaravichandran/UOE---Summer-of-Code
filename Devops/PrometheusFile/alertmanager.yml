# Alertmanager Configuration for EvaSafe
global:
  smtp_smarthost: 'localhost:587'
  smtp_from: 'alerts@evasafe.com'
  smtp_auth_username: 'alerts@evasafe.com'
  smtp_auth_password: 'your-email-password'
  slack_api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'

# Define templates for notifications
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Routing tree for alerts
route:
  group_by: ['alertname', 'service', 'severity']
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 12h
  receiver: 'default-receiver'
  
  routes:
    # Critical alerts - immediate notification
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 0s
      repeat_interval: 5m
      
    # Warning alerts - standard notification
    - match:
        severity: warning
      receiver: 'warning-alerts'
      repeat_interval: 1h
      
    # Crime detection alerts - special handling
    - match:
        service: crime-detection
      receiver: 'crime-detection-alerts'
      group_wait: 5s
      repeat_interval: 30m
      
    # Security alerts - immediate notification
    - match_re:
        alertname: '.*Security.*|.*Unauthorized.*'
      receiver: 'security-alerts'
      group_wait: 0s
      repeat_interval: 15m

# Define receivers for different alert types
receivers:
  - name: 'default-receiver'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
        channel: '#general'
        title: 'EvaSafe Alert'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Severity:* {{ .Labels.severity }}
          *Service:* {{ .Labels.service }}
          {{ end }}
        
  - name: 'critical-alerts'
    email_configs:
      - to: 'devops@evasafe.com,admin@evasafe.com'
        subject: '🚨 CRITICAL: {{ .GroupLabels.alertname }} - EvaSafe'
        body: |
          CRITICAL ALERT TRIGGERED
          
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Service: {{ .Labels.service }}
          Instance: {{ .Labels.instance }}
          Severity: {{ .Labels.severity }}
          Started: {{ .StartsAt }}
          {{ end }}
          
          Please investigate immediately.
          
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
        channel: '#alerts-critical'
        color: 'danger'
        title: '🚨 CRITICAL ALERT'
        text: |
          {{ range .Alerts }}
          *Service:* {{ .Labels.service }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Started:* {{ .StartsAt }}
          {{ end }}
        actions:
          - type: button
            text: 'View in Prometheus'
            url: 'http://localhost:9090/alerts'
          - type: button
            text: 'View Grafana Dashboard'
            url: 'http://localhost:3000/d/evasafe/evasafe-overview'
            
  - name: 'warning-alerts'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
        channel: '#alerts-warning'
        color: 'warning'
        title: '⚠️ Warning Alert'
        text: |
          {{ range .Alerts }}
          *Service:* {{ .Labels.service }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          {{ end }}
          
  - name: 'crime-detection-alerts'
    email_configs:
      - to: 'security-team@evasafe.com'
        subject: '🔍 Crime Detection Alert - {{ .GroupLabels.alertname }}'
        body: |
          Crime Detection System Alert
          
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Service: {{ .Labels.service }}
          Time: {{ .StartsAt }}
          {{ end }}
          
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
        channel: '#crime-detection'
        color: 'warning'
        title: '🔍 Crime Detection Alert'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Service:* {{ .Labels.service }}
          {{ end }}
          
  - name: 'security-alerts'
    email_configs:
      - to: 'security-team@evasafe.com,devops@evasafe.com'
        subject: '🛡️ SECURITY ALERT - {{ .GroupLabels.alertname }}'
        body: |
          SECURITY INCIDENT DETECTED
          
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Service: {{ .Labels.service }}
          Instance: {{ .Labels.instance }}
          Time: {{ .StartsAt }}
          {{ end }}
          
          Immediate investigation required.
          
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
        channel: '#security-alerts'
        color: 'danger'
        title: '🛡️ SECURITY ALERT'
        text: |
          {{ range .Alerts }}
          *SECURITY INCIDENT*
          *Service:* {{ .Labels.service }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Time:* {{ .StartsAt }}
          {{ end }}
        actions:
          - type: button
            text: 'View Security Dashboard'
            url: 'http://localhost:3000/d/security/security-overview'
          - type: button
            text: 'Incident Response'
            url: 'https://evasafe.com/incident-response'

# Inhibition rules to reduce noise
inhibit_rules:
  # Inhibit warning alerts if critical alert for same service is firing
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['service', 'instance']
    
  # Inhibit individual service alerts if general service down alert is firing
  - source_match:
      alertname: 'ServiceDown'
    target_match_re:
      alertname: 'High.*|.*Slow.*|.*Error.*'
    equal: ['service', 'instance']